name: Gorong Backend CI/CD

# sandbox 브랜치에 코드가 push 될 때만 이 자동화가 실행됩니다.
on:
  push:
    branches: [ "sandbox" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 임시 컴퓨터에 우리 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 자바 25 세팅 (팀장님 버전 맞춤)
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3. Gradle 빌드 (jar 파일 생성)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test

      # 4. 도커 이미지 만들고 도커 허브로 전송
      - name: Docker Build & Push to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest

      # 5. EC2에 접속해서 최신 이미지 다운받고 실행하기
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest
            docker stop gorong-back || true
            docker rm gorong-back || true
            docker run -d --name gorong-back -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest