name: Gorong Total CI/CD (Back + Front)

on:
  push:
    branches: [ "sandbox" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ==========================================
    # 1. 백엔드(Spring Boot) 빌드
    # ==========================================
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Backend Build (Gradle)
      env:
        FIREBASE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }} # 깃허브 자체 변수에 임시 저장
      run: |
        cd gorong-back
        
        mkdir -p src/main/resources
        echo "$FIREBASE_KEY" > src/main/resources/serviceAccountKey.json
        
        chmod +x ./gradlew
        ./gradlew build -x test

    # ==========================================
    # 2. 도커 허브 로그인
    # ==========================================
    - name: Docker Login
      run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

    # ==========================================
    # 3. 백엔드 도커 이미지 빌드 및 푸시
    # ==========================================
    - name: Docker Build & Push (Back)
      run: |
        cd gorong-back
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest

    # ==========================================
    # 4. 프론트엔드 도커 이미지 빌드 및 푸시
    # ==========================================
    - name: Docker Build & Push (Front)
      run: |
        cd gorong-front

        # 💡 [핵심] 프론트엔드(Vite) 빌드에 필요한 7개의 환경 변수를 .env 파일로 생성.
        echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env
        echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env
        echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
        echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env
        echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
        echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
        echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env
        echo "VITE_JUSO_API_KEY=${{ secrets.VITE_JUSO_API_KEY }}" >> .env
        
        # 생성된 .env를 품고 이미지를 구워낸 뒤 도커 허브로 올립니다.
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gorong-front:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/gorong-front:latest

    # ==========================================
    # 5. EC2로 docker-compose.yml 파일 배달
    # ==========================================
    - name: Send docker-compose.yml to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.yml" 
        target: "/home/ubuntu/"      

    # ==========================================
    # 6. EC2 접속 및 통합 배포 실행
    # ==========================================
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/
          
          # 💡 [핵심] 백엔드 및 인프라 실행에 필요한 환경 변수를 EC2의 .env 파일에 저장.
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "TOUR_API_KEY=${{ secrets.TOUR_API_KEY }}" >> .env
          
          # 최신 이미지를 다운받고 백그라운드(-d)에서 컨테이너를 실행합니다.
          docker compose pull
          docker compose up -d
