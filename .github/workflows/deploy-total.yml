name: Gorong Total CI/CD (Back + Front)

on:
  push:
    branches: [ "sandbox" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- 백엔드 빌드 파트 ---
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Backend Build
      run: |
        cd gorong-back
        chmod +x ./gradlew
        ./gradlew build -x test

    # 프론트엔드 npm build 단계는 삭제했습니다! (도커가 알아서 해줍니다)

    # --- 도커 이미지 빌드 및 푸시 ---
    - name: Docker Login
      run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

    - name: Docker Build & Push (Back)
      run: |
        cd gorong-back
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/gorong-back:latest

    - name: Docker Build & Push (Front)
      run: |
        cd gorong-front
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gorong-front:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/gorong-front:latest

    # 내 프로젝트의 docker-compose.yml 파일을 EC2로 배달합니다!
    - name: Send docker-compose.yml to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.yml" # 깃허브에 있는 이 파일을
        target: "/home/ubuntu/"      # EC2의 이 경로로 복사해라!

    # --- EC2 통합 배포 (Docker Compose 실행) ---
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          # 방금 배달받은 파일을 이용해 도커를 실행합니다!
          docker compose pull
          docker compose up -d
