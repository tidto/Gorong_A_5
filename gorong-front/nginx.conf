server {
    listen 80;

    # 1. 프론트엔드 화면 처리 (React 웹)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # React Router(SPA) 필수 설정: 경로를 못 찾으면 index.html로 넘김
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API 요청 처리 (리버스 프록시)
    # 프론트엔드에서 '/api/...' 로 요청을 보내면, Nginx가 백엔드로 몰래 전달해 줍니다.
    location /api/ {
        # 도커 컴포즈 내부 네트워크를 사용하므로 컨테이너 이름(gorong-back)으로 통신 가능!
        proxy_pass http://gorong-back:8080;
        
        # 헤더 정보 전달 (백엔드에서 클라이언트 IP 등을 정확히 알 수 있게 해줌)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}