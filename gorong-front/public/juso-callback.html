                         engAddr, jibunAddr, zipNo, admCd, rnMgtSn, bdMgtSn,
                         detBdNmList, bdNm, bdKdcd, siNm, sggNm, emdNm,
                         liNm, rn, udrtYn, buldMnnm, buldSlno, mtYn,
                         lnbrMnnm, lnbrSlno, emdNo, hstryYn, relJibun,
                         hemdNm, entX, entY) {

      roadAddr: roadFullAddr,
      jibunAddr: jibunAddr,

      entX: entX,
